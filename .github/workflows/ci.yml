name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      # Install deps
      - name: Install dependencies
        run: bun install

      # Lint
      - name: Lint
        run: bun run lint

      # Build Docker image
      - name: Build Docker image
        run: docker build -t app .

      # Run container
      - name: Run container
        run: docker run -d -p 3000:3000 app

      # Wait for server
      - name: Wait for server
        run: sleep 5

      # Run tests (against running container)
      - name: Run tests
        run: bun test

      # Health check (explicit verification)
      - name: Check health endpoint
        run: curl --fail http://localhost:3000/health