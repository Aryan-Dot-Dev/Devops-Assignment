name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: npm install
      - run: npm run lint
      - run: npm test

      - run: docker build -t app .
      - run: docker run -d -p 3000:3000 app
      - run: sleep 5
      - run: curl http://localhost:3000/health